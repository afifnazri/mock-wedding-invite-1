<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Majlis Perkahwinan Afif & Athirah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f9f6f1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: 'Lato', sans-serif;
    }

    .invite-wrap {
      width: 100%;
      max-width: 440px;
    }

    .invite-card {
      background: #ffffff;
      border: 1px solid #e8e0d4;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      text-align: center;
      position: relative;
    }

    .corner-tl, .corner-tr, .corner-bl, .corner-br {
      position: absolute;
      width: 36px;
      height: 36px;
      opacity: 0.4;
    }
    .corner-tl { top: 14px; left: 14px; border-top: 1px solid #8B6F47; border-left: 1px solid #8B6F47; border-radius: 4px 0 0 0; }
    .corner-tr { top: 14px; right: 14px; border-top: 1px solid #8B6F47; border-right: 1px solid #8B6F47; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: 14px; left: 14px; border-bottom: 1px solid #8B6F47; border-left: 1px solid #8B6F47; border-radius: 0 0 0 4px; }
    .corner-br { bottom: 14px; right: 14px; border-bottom: 1px solid #8B6F47; border-right: 1px solid #8B6F47; border-radius: 0 0 4px 0; }

    .eyebrow {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #9a8a78;
      margin-bottom: 1.4rem;
    }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px;
      font-weight: 300;
      font-style: italic;
      color: #2c2418;
      line-height: 1.15;
    }

    .ampersand {
      font-size: 34px;
      color: #8B6F47;
      opacity: 0.7;
      display: block;
      line-height: 1.1;
      margin: 0.1rem 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.4rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #d4c4b0;
    }
    .divider span {
      font-size: 13px;
      color: #8B6F47;
      opacity: 0.6;
    }

    .detail-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
      font-size: 14px;
      color: #6b5d4f;
      font-weight: 300;
    }

    .detail-row svg {
      flex-shrink: 0;
      margin-top: 1px;
      color: #8B6F47;
    }

    .detail-label {
      color: #2c2418;
      font-weight: 400;
    }

    .countdown-heading {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9a8a78;
      margin-bottom: 0.8rem;
    }

    .countdown-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 6px;
    }

    .countdown-box {
      text-align: center;
      min-width: 56px;
    }

    .countdown-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      color: #2c2418;
      display: block;
      line-height: 1;
    }

    .countdown-label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9a8a78;
      margin-top: 5px;
      display: block;
    }

    .countdown-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      color: #8B6F47;
      opacity: 0.4;
      padding-top: 3px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 1.8rem;
    }

    .btn {
      flex: 1;
      padding: 11px 0;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity 0.15s;
    }

    .btn-outline {
      background: transparent;
      color: #8B6F47;
      border: 1px solid #8B6F47;
    }

    .btn-fill {
      background: #8B6F47;
      color: #ffffff;
      border: none;
    }

    .btn:hover { opacity: 0.75; }

    .footer-note {
      margin-top: 1.6rem;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #b0a090;
    }

    @media (max-width: 480px) {
      .invite-card { padding: 2.5rem 1.5rem; }
      .names { font-size: 36px; }
      .countdown-num { font-size: 28px; }
      .countdown-box { min-width: 44px; }
    }
  </style>
</head>
<body>
  <div class="invite-wrap">
    <div class="invite-card">
      <div class="corner-tl"></div>
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <div class="corner-br"></div>

      <p class="eyebrow">Menjemput ke majlis yang diberkati</p>

      <div class="names">
        Afif
        <span class="ampersand">&amp;</span>
        Athirah
      </div>

      <div class="divider"><span>✦</span></div>

      <div style="margin-bottom: 1rem;">
        <div class="detail-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="detail-label">Ahad, 1 November 2026</span>
        </div>
        <div class="detail-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>11.00 pagi &nbsp;·&nbsp; Majlis Perkahwinan</span>
        </div>
        <div class="detail-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>Lembah Pantai Community Centre</span>
        </div>
      </div>

      <div class="divider"><span>✦</span></div>

      <p class="countdown-heading">Hari bahagia menghampiri</p>
      <div class="countdown-wrap">
        <div class="countdown-box">
          <span class="countdown-num" id="cd-days">--</span>
          <span class="countdown-label">Hari</span>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-box">
          <span class="countdown-num" id="cd-hours">--</span>
          <span class="countdown-label">Jam</span>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-box">
          <span class="countdown-num" id="cd-mins">--</span>
          <span class="countdown-label">Minit</span>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-box">
          <span class="countdown-num" id="cd-secs">--</span>
          <span class="countdown-label">Saat</span>
        </div>
      </div>

      <div class="btn-row">
        <a class="btn btn-outline" href="https://maps.app.goo.gl/wx2eG25VmbfR9URB8" target="_blank" rel="noopener">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Lokasi
        </a>
        <a class="btn btn-fill" href="https://docs.google.com/forms/d/e/1FAIpQLSfoqgIBYxmsYOvEO6LOoxDKik8OFsuGFUNbC-e9rLkTHajepQ/viewform" target="_blank" rel="noopener">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          RSVP
        </a>
      </div>

      <p class="footer-note">Kehadiran anda amat kami hargai &nbsp;·&nbsp; Dress code: Smart casual</p>
    </div>
  </div>

  <script>
    function tick() {
      var target = new Date('2025-12-01T11:00:00');
      var now = new Date();
      var diff = target - now;

      if (diff <= 0) {
        document.getElementById('cd-days').textContent = '0';
        document.getElementById('cd-hours').textContent = '00';
        document.getElementById('cd-mins').textContent = '00';
        document.getElementById('cd-secs').textContent = '00';
        return;
      }

      var days = Math.floor(diff / 86400000);
      var hours = Math.floor((diff % 86400000) / 3600000);
      var mins = Math.floor((diff % 3600000) / 60000);
      var secs = Math.floor((diff % 60000) / 1000);

      document.getElementById('cd-days').textContent = days;
      document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
      document.getElementById('cd-secs').textContent = String(secs).padStart(2, '0');
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
